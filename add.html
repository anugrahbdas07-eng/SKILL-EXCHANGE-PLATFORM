<!DOCTYPE html>
<html>
<head>
    <title>Add Skill</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Add Your Skill</h2>

<form id="skillForm">
    <input type="text" id="name" placeholder="Your Name" required><br>
    <input type="text" id="skill" placeholder="Skill You Offer" required><br>
    <input type="text" id="want" placeholder="Skill You Want" required><br>
    <input type="text" id="contact" placeholder="Contact Info" required><br>
    <button type="submit">Submit</button>
</form>

<script src="script.js"></script>

</body>
</html>
